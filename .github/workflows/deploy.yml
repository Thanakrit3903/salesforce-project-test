name: Salesforce & Vlocity Unified Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  Full_System_Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Install Node & Tools
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI & Plugins
        run: |
          npm install @salesforce/cli --global
          npm install -g vlocity@1.17.15
          echo 'y' | sf plugins install sfdx-git-delta
        
      - name: Authenticate to Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default
          rm sfdx_auth.txt

      # --- STEP 1: DELTA GENERATION (FOR APEX/METADATA) ---
      - name: Generate Salesforce Delta
        id: generate_delta
        run: |
          rm -rf delta && mkdir -p delta
          git fetch --tags --force
          
          # หาจุดสำเร็จล่าสุดจาก Tag
          if git rev-parse last_successful_deploy >/dev/null 2>&1; then
            FROM_SHA=$(git rev-parse last_successful_deploy)
          else
            FROM_SHA=${{ github.event.before }}
          fi
          
          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$FROM_SHA" ]; then
            FROM_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi
          
          echo "FROM_SHA=$FROM_SHA" >> $GITHUB_ENV
          sf sgd source delta --to HEAD --from "$FROM_SHA" --output-dir delta/ --generate-delta

      # --- STEP 2: VLOCITY DELTA DETECTION (JSON DATA PACKS) ---
      - name: Detect Vlocity Changes
        id: vlocity_delta
        run: |
          # หาไฟล์ที่เปลี่ยน และทำให้อยู่ในรูปแบบ JSON Array ["Type/Name","Type/Name"]
          V_DIFF=$(git diff --name-only ${{ env.FROM_SHA }} HEAD | grep '^vlocity/' | cut -d/ -f2,3 | sort -u)
          
          if [ -n "$V_DIFF" ]; then
            # แปลงรายการเป็น ["Item1","Item2"]
            MANIFEST_JSON=$(echo "$V_DIFF" | jq -R . | jq -s -c .)
            echo "HAS_VLOCITY=true" >> $GITHUB_ENV
            echo "VLOCITY_MANIFEST=$MANIFEST_JSON" >> $GITHUB_ENV
            echo "🎯 Manifest created: $MANIFEST_JSON"
          else
            echo "HAS_VLOCITY=false" >> $GITHUB_ENV
          fi

      # --- STEP 3: PRE-DEPLOY FIXES (PREVENT SOQL 101 & DUPLICATES) ---
      - name: Apply Vlocity Fixes (Manual Resolutions)
        if: env.HAS_VLOCITY == 'true'
        run: |
          echo "🔧 Disabling Product2 Post-Process to prevent SOQL 101..."
          
          # เปลี่ยนมาใช้คำสั่งนี้แทน
          sf data update record \
            --sobject VlocityDataPackConfiguration__mdt \
            --where "DeveloperName='Product2'" \
            --values "DefaultImportPostProcess__c=''" || echo "⚠️ Warning: Could not find Product2 Metadata Configuration"

      # --- STEP 4: METADATA DEPLOYMENT (APEX, LWC, ETC.) ---
      - name: Deploy Salesforce Metadata
        id: deploy_sf
        run: |
          if [ -f "delta/package/package.xml" ] && grep -q "<types>" delta/package/package.xml; then
            echo "🚀 Deploying Metadata Delta..."
            sf project deploy start \
              --manifest delta/package/package.xml \
              --pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
              --test-level NoTestRun \
              --wait 30 --verbose
          else
            echo "✅ No Metadata changes to deploy."
          fi

      # --- STEP 5: VLOCITY DEPLOYMENT (OMNISCRIPT, IP, EPC) ---
      - name: Deploy Vlocity DataPacks
        if: env.HAS_VLOCITY == 'true'
        run: |
          echo "📍 Current Directory: $(pwd)"
          echo "📁 Listing vlocity folder content:"
          ls -R vlocity/
          
          ACCESS_TOKEN=$(sf org display --json | jq -r '.result.accessToken')
          INSTANCE_URL=$(sf org display --json | jq -r '.result.instanceUrl')
          
          echo "sf.accessToken = $ACCESS_TOKEN" > pipeline.properties
          echo "sf.instanceUrl = $INSTANCE_URL" >> pipeline.properties

          # เพิ่ม --refreshVlocityDataPackMapping เพื่อล้าง cache เดิม
          vlocity -propertyfile pipeline.properties \
                  -job vbt-config/EPC.yaml \
                  -manifest '${{ env.VLOCITY_MANIFEST }}' \
                  packDeploy \
                  --vlocity.activate true \
                  --vlocity.refreshVlocityDataPackMapping true \
                  --simpleLogging false \
                  --verbose

      - name: Debug File System
        run: |
          echo "--- เช็คว่าโฟลเดอร์ vlocity อยู่ที่ไหน ---"
          ls -R vlocity/OmniScript/
          
      # --- STEP 6: SUCCESS HANDLING (TAGGING) ---
      - name: Finalize Deployment (Update Tag)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f last_successful_deploy HEAD
          git push origin last_successful_deploy --force
